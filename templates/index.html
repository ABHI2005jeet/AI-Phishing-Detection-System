<!DOCTYPE html>
<html>
<head>
    <title>Sentinel AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:linear-gradient(135deg,#1f4037,#99f2c8);min-height:100vh;">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Sentinel AI</a>
        <div>
            <a class="btn btn-outline-light me-2" href="/">Scanner</a>
            <a class="btn btn-outline-warning me-2" href="/dashboard">Dashboard</a>
            <a class="btn btn-outline-info" href="/metrics">Model Metrics</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
<div class="card p-4 shadow">

<h3 class="text-center mb-4">AI-Based Phishing Detection</h3>

<form method="POST" action="/analyze">

<label>Select Scan Type:</label>

<div class="form-check">
<input class="form-check-input" type="radio" name="scan_type" value="text" checked>
<label class="form-check-label">Scan Message / Email</label>
</div>

<div class="form-check mb-3">
<input class="form-check-input" type="radio" name="scan_type" value="url">
<label class="form-check-label">Scan URL Only</label>
</div>

<textarea class="form-control mb-3" name="text" rows="4"
placeholder="Paste text or URL here..." required></textarea>

<button type="submit" class="btn btn-primary w-100">Analyze</button>

</form>

</div>
</div>

</body>
</html>
